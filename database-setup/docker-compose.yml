version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: drdo_postgres
    environment:
      POSTGRES_DB: drdo_underwater
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: drdo123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  minio:
    image: minio/minio:latest
    container_name: drdo_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: drdo123456
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: drdo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@drdo.gov.in
      PGADMIN_DEFAULT_PASSWORD: drdo123456
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: always

volumes:
  postgres_data:
  minio_data:
