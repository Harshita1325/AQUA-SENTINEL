<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing History - Marine Defense Cyber Shield</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .background-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 159, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.1) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #00FF9F;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 255, 159, 0.1);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            height: 50px;
            filter: brightness(1.2);
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #00FF9F 0%, #8A2BE2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hamburger {
            width: 30px;
            height: 25px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .hamburger:hover {
            transform: scale(1.1);
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(11px) rotate(45deg);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: translateY(-11px) rotate(-45deg);
        }

        .hamburger span {
            width: 100%;
            height: 3px;
            background: #00FF9F;
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* Menu Dropdown */
        .menu-dropdown {
            position: fixed;
            top: 90px;
            right: 40px;
            min-width: 220px;
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00FF9F;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 255, 159, 0.2);
            backdrop-filter: blur(10px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-20px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .menu-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 18px 25px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid rgba(0, 255, 159, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-item:first-child {
            border-radius: 13px 13px 0 0;
        }

        .menu-item:last-child {
            border-bottom: none;
            border-radius: 0 0 13px 13px;
        }

        .menu-item:hover {
            background: rgba(0, 255, 159, 0.15);
            padding-left: 35px;
            color: #00FF9F;
        }

        .menu-item.active-page {
            background: rgba(0, 255, 159, 0.2);
            border-left: 4px solid #00FF9F;
            color: #00FF9F;
        }

        /* Container */
        .container {
            margin-top: 80px;
            padding: 40px;
            position: relative;
            z-index: 1;
            max-width: 1600px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-title {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            margin: 40px 0 20px;
            background: linear-gradient(135deg, #00FF9F 0%, #8A2BE2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 159, 0.3);
        }

        .page-subtitle {
            text-align: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 30px;
            background: rgba(0, 255, 159, 0.1);
            border: 2px solid #00FF9F;
            border-radius: 25px;
            color: #00FF9F;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: rgba(0, 255, 159, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 159, 0.3);
        }

        .filter-btn.active {
            background: #00FF9F;
            color: #0a0e27;
        }

        /* History Grid */
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .history-card {
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid rgba(0, 255, 159, 0.3);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .history-card:hover {
            border-color: #00FF9F;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 159, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #00FF9F;
        }

        .card-badge {
            padding: 5px 12px;
            background: rgba(138, 43, 226, 0.3);
            border: 1px solid #8A2BE2;
            border-radius: 12px;
            font-size: 12px;
            color: #8A2BE2;
        }

        .image-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .image-box {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-label {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .original-label {
            color: #ff6b6b;
        }

        .enhanced-label {
            color: #00FF9F;
        }

        .card-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 159, 0.2);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 20px;
            color: #00FF9F;
        }

        .spinner {
            border: 4px solid rgba(0, 255, 159, 0.1);
            border-top: 4px solid #00FF9F;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .history-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 36px;
            }

            .container {
                padding: 20px;
            }

            .filter-bar {
                gap: 10px;
            }

            .filter-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>

    <!-- Header -->
    <div class="header">
        <div class="logo-section">
            <img src="/photos/gov logo.png" alt="Government Logo" class="logo" onerror="this.style.display='none'">
            <div class="title">🌊 Marine Defense Cyber Shield</div>
            <img src="/photos/navy logo.png" alt="Navy Logo" class="logo" onerror="this.style.display='none'">
        </div>
        <div class="hamburger" onclick="toggleMenu()" id="hamburgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- Menu Dropdown -->
    <div class="menu-dropdown" id="menuDropdown">
        <div class="menu-item" onclick="navigateTo('dashboard')"> Dashboard</div>
        <div class="menu-item" onclick="navigateTo('analytics')"> Analytics</div>
      <div class="menu-item" onclick="navigateTo('profile')"> Profile</div>
        <div class="menu-item" onclick="navigateTo('model')"> Model</div>
        <div class="menu-item active-page"> History</div>
        <div class="menu-item" onclick="logout()"> Logout</div>
    </div>

    <!-- Container -->
    <div class="container">
        <div class="page-title"> Processing History</div>
        <div class="page-subtitle">Recent underwater image enhancement operations</div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterHistory('all')">All</button>
            <button class="filter-btn" onclick="filterHistory('enhanced')">Enhanced Only</button>
            <button class="filter-btn" onclick="filterHistory('threat')">Threat Detection</button>
            <button class="filter-btn" onclick="filterHistory('distance')">Distance Measurement</button>
        </div>

        <!-- History Grid -->
        <div class="history-grid" id="historyGrid">
            <!-- Cards will be populated by JavaScript -->
        </div>
    </div>

    <script>
        // Toggle Menu
        function toggleMenu() {
            const btn = document.getElementById('hamburgerBtn');
            const menu = document.getElementById('menuDropdown');
            btn.classList.toggle('active');
            menu.classList.toggle('active');
        }

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('menuDropdown');
            const hamburger = document.getElementById('hamburgerBtn');
            
            if (!menu.contains(event.target) && !hamburger.contains(event.target)) {
                menu.classList.remove('active');
                hamburger.classList.remove('active');
            }
        });

        // Navigation
        function navigateTo(page) {
            toggleMenu();
            switch(page) {
                case 'dashboard':
                    window.location.href = '/';
                    break;
                case 'analytics':
                    window.location.href = '/analytics';
                    break;
                case 'profile':
                    window.location.href = '/profile';
                    break;
                case 'model':
                    window.location.href = '/model';
                    break;
            }
        }

        // Logout
        function logout() {
            toggleMenu();
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = '/';
            }
        }

        // Filter History
        function filterHistory(type) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            loadHistory(type);
        }

        // Load History Data
        async function loadHistory(filter = 'all') {
            const grid = document.getElementById('historyGrid');
            
            // Show loading
            grid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading history...</div>';
            
            try {
                const response = await fetch('/api/history?filter=' + filter);
                const data = await response.json();
                
                if (data.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div class="empty-state-text">No Processing History</div>
                            <div class="empty-state-subtext">Upload and process some images to see them here</div>
                        </div>
                    `;
                    return;
                }
                
                // Render history cards
                grid.innerHTML = data.map(item => `
                    <div class="history-card">
                        <div class="card-header">
                            <div class="card-title">${item.filename}</div>
                            <div class="card-badge">${item.type}</div>
                        </div>
                        <div class="image-comparison">
                            <div class="image-box">
                                <img src="${item.original}" alt="Original">
                                <div class="image-label original-label">Original</div>
                            </div>
                            <div class="image-box">
                                <img src="${item.processed}" alt="Processed">
                                <div class="image-label enhanced-label">Enhanced</div>
                            </div>
                        </div>
                        <div class="card-info">
                            <div class="info-item"> ${item.date}</div>
                            <div class="info-item">⏱ ${item.time}</div>
                            <div class="info-item"> ${item.status}</div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading history:', error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">Error Loading History</div>
                        <div class="empty-state-subtext">Please try again later</div>
                    </div>
                `;
            }
        }

        // Load history on page load
        loadHistory('all');
    </script>
</body>
</html>
