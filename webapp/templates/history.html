<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - AQUA-SENTINEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='modern_theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='header_modern.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='page_transitions.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
        
        :root {
            --aqua-primary: #00D9FF;
            --aqua-primary-dark: #00B8CC;
            --aqua-primary-light: #33E0FF;
            --aqua-dark: #FFFFFF;
            --aqua-light: #0A0A0F;
            --aqua-border: rgba(0, 217, 255, 0.2);
            --aqua-accent: #00B8CC;
            --component-bg: rgba(18, 18, 26, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--aqua-light);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 217, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 217, 255, 0.03) 0px, transparent 50%);
            color: var(--aqua-dark);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* DRDO-Style Header */
        .drdo-header {
            background: #0F0F0F;
            border-bottom: 2px solid var(--aqua-border);
            padding: 1rem 3rem;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .gov-emblem {
            height: 60px;
            width: auto;
        }

        .header-title {
            display: flex;
            flex-direction: column;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--aqua-dark);
            margin-bottom: 0.25rem;
            letter-spacing: 0.5px;
        }

        .header-title .subtitle {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--aqua-primary);
            letter-spacing: 0.3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .drdo-logo {
            height: 70px;
            width: auto;
        }

        .theme-toggle {
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid var(--aqua-primary);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 0;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--aqua-primary);
            transform: scale(1.1);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: var(--aqua-primary);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover svg {
            fill: #000000;
        }

        /* Light Mode Styles */
        body.light-mode {
            background: #FAFBFF;
            color: #111827;
        }

        body.light-mode .drdo-header {
            background: rgba(255, 255, 255, 0.96);
            border-bottom-color: #E2E8F0;
            backdrop-filter: blur(12px);
        }

        body.light-mode .header-title h1,
        body.light-mode .page-title {
            color: #0F172A;
        }

        body.light-mode .history-card {
            background: #FFFFFF;
            border-color: #E2E8F0;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
        }

        body.light-mode .card-title,
        body.light-mode p {
            color: #374151;
        }

        body.light-mode .theme-toggle svg {
            fill: #0284C7;
        }

        /* Navigation Bar */
        .navbar {
            background: var(--aqua-primary);
            padding: 0;
            border-radius: 4px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            margin: 0;
        }

        .nav-links a {
            display: block;
            color: #000000;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.875rem 2rem;
            transition: all 0.2s ease;
            border-right: 1px solid rgba(0, 0, 0, 0.1);
        }

        .nav-links li:last-child a {
            border-right: none;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: var(--aqua-accent);
            color: var(--aqua-dark);
        }

        .container-custom {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2.5rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--aqua-primary) 0%, var(--aqua-primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            background: var(--component-bg);
            border: 1px solid var(--aqua-border);
            border-radius: 6px;
            color: #aaa;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--aqua-primary);
            color: #000000;
            border-color: var(--aqua-primary);
            font-weight: 700;
        }

        .filter-btn:hover {
            border-color: var(--aqua-primary);
            color: var(--aqua-primary);
        }
        
        .filter-btn.active:hover {
            color: #000;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .history-card {
            background: rgba(18, 18, 26, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--aqua-border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .history-card:hover {
            border-color: var(--aqua-primary);
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.3);
            transform: translateY(-4px);
        }

        .card-header-custom {
            background: #1a1a1a;
            padding: 1rem;
            border-bottom: 1px solid var(--aqua-border);
        }

        .card-title {
            color: var(--aqua-dark);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(0, 217, 255, 0.15);
            color: var(--aqua-primary);
            border: 1px solid var(--aqua-primary);
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .badge-threat {
            background: rgba(255, 167, 38, 0.15);
            color: #FFA726;
            border-color: #FFA726;
        }

        .badge-video {
            background: rgba(171, 71, 188, 0.15);
            color: #AB47BC;
            border-color: #AB47BC;
        }

        .card-body-custom {
            padding: 1rem;
        }

        .image-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .image-box {
            aspect-ratio: 16/9;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--aqua-border);
            background: linear-gradient(135deg, #111, #222);
        }

        .image-box.enhanced {
            background: linear-gradient(135deg, #004e66, #002233);
        }

        .image-label {
            position: absolute;
            top: 4px;
            left: 4px;
            padding: 2px 6px;
            background: rgba(0, 0, 0, 0.8);
            color: var(--aqua-primary);
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 3px;
            border: 1px solid rgba(0, 217, 255, 0.3);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
            padding-top: 1rem;
            border-top: 1px solid var(--aqua-border);
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-sm {
            padding: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 4px;
        }

        .btn-outline-primary {
            border-color: var(--aqua-border);
            color: #aaa;
            background: transparent;
        }

        .btn-outline-primary:hover {
            background: #333;
            border-color: #fff;
            color: #fff;
        }

        .btn-primary {
            background: var(--aqua-primary);
            border-color: var(--aqua-primary);
            color: #000;
            font-weight: 700;
        }

        .btn-primary:hover {
            background: #00B8CC;
            border-color: #00B8CC;
            color: #000;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .drdo-header {
                padding: 1rem 1.5rem;
            }

            .nav-links {
                flex-wrap: wrap;
            }

            .nav-links a {
                padding: 0.75rem 1rem;
                font-size: 0.875rem;
            }

            .container-custom {
                padding: 1.5rem;
            }

            .history-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- DRDO-Style Header -->
    <div class="drdo-header">
        <div class="header-top">
            <div class="header-left">
                <img src="/photos/gov logo.png" alt="Government of India" class="gov-emblem" onerror="this.style.display='none'">
                <div class="header-title">
                    <h1>Government of India</h1>
                    <span class="subtitle">Underwater Defense Shield</span>
                </div>
            </div>
            <div class="header-right">
                <img src="/photos/navy logo.png" alt="Navy Logo" class="drdo-logo" onerror="this.style.display='none'">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Navigation Bar -->
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/analytics">Analytics</a></li>
                <li><a href="/profile">Profile</a></li>
                <li><a href="/history" class="active">History</a></li>
                <li><a href="/model">Models</a></li>
                <li><a href="/live-video">Live Video</a></li>
            </ul>
        </nav>
    </div>

    <div class="container-custom">
        <h1 class="page-title">Processing History</h1>
        <p class="page-subtitle">Recent underwater image and video enhancement operations</p>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterHistory(event, 'all')">All</button>
            <button class="filter-btn" onclick="filterHistory(event, 'enhanced')">Enhanced</button>
            <button class="filter-btn" onclick="filterHistory(event, 'threat')">Threats</button>
            <button class="filter-btn" onclick="filterHistory(event, 'video')">Videos</button>
        </div>

        <div class="history-grid" id="historyGrid">
            <!-- History cards will be loaded here dynamically -->
            <div class="text-center" style="grid-column: 1 / -1; padding: 3rem; color: #888;">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem; border-color: var(--aqua-primary); border-right-color: transparent;">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Loading processing history...</p>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content" style="background: var(--component-bg); border: 2px solid var(--aqua-border);">
                <div class="modal-header" style="border-bottom: 1px solid var(--aqua-border);">
                    <h5 class="modal-title" style="color: var(--aqua-primary);" id="modalTitle">Image Comparison</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <h6 style="color: var(--aqua-primary); margin-bottom: 1rem;">Original</h6>
                            <img id="modalOriginal" src="" class="img-fluid" style="border: 1px solid var(--aqua-border); border-radius: 8px; width: 100%;">
                        </div>
                        <div class="col-md-6">
                            <h6 style="color: var(--aqua-primary); margin-bottom: 1rem;">Processed</h6>
                            <img id="modalProcessed" src="" class="img-fluid" style="border: 1px solid var(--aqua-border); border-radius: 8px; width: 100%;">
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--aqua-border);">
                    <button type="button" class="btn btn-outline-primary" data-bs-dismiss="modal">Close</button>
                    <a id="downloadBtn" href="" download class="btn btn-primary">Download Processed</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentFilter = 'all';
        let historyData = [];

        // Load history on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadHistory('all');
        });

        function filterHistory(event, type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentFilter = type;
            loadHistory(type);
        }

        function loadHistory(filter) {
            const grid = document.getElementById('historyGrid');
            
            // Show loading
            grid.innerHTML = `
                <div class="text-center" style="grid-column: 1 / -1; padding: 3rem; color: #888;">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem; border-color: var(--aqua-primary); border-right-color: transparent;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3">Loading processing history...</p>
                </div>
            `;

            fetch(`/api/history?filter=${filter}`)
                .then(response => response.json())
                .then(data => {
                    historyData = data;
                    displayHistory(data);
                })
                .catch(error => {
                    console.error('Error loading history:', error);
                    grid.innerHTML = `
                        <div class="text-center" style="grid-column: 1 / -1; padding: 3rem; color: #888;">
                            <p>❌ Error loading history</p>
                            <p class="small">${error.message}</p>
                        </div>
                    `;
                });
        }

        function displayHistory(data) {
            const grid = document.getElementById('historyGrid');
            
            if (data.length === 0) {
                grid.innerHTML = `
                    <div class="text-center" style="grid-column: 1 / -1; padding: 3rem; color: #888;">
                        <p style="font-size: 3rem;">📭</p>
                        <p>No processing history found</p>
                        <p class="small">Process some images to see them here</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = data.map((item, index) => {
                const badgeClass = item.type.includes('Threat') ? 'badge-threat' : 
                                  item.type.includes('Video') ? 'badge-video' : '';
                const badgeText = item.type.includes('Threat') ? 'Threat' :
                                 item.type.includes('Video') ? 'Video' : 'Enhanced';
                
                return `
                    <div class="history-card">
                        <div class="card-header-custom">
                            <div class="card-title" title="${item.filename}">${item.filename}</div>
                            <span class="badge ${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="card-body-custom">
                            <div class="image-comparison">
                                <div class="image-box" style="background-image: url('${item.original}'); background-size: cover; background-position: center;">
                                    <div class="image-label">Original</div>
                                </div>
                                <div class="image-box enhanced" style="background-image: url('${item.processed}'); background-size: cover; background-position: center;">
                                    <div class="image-label">${badgeText}</div>
                                </div>
                            </div>
                            <div class="card-meta">
                                <span>${item.date}</span>
                                <span>${item.time}</span>
                                <span style="color: #4CAF50;">${item.status}</span>
                            </div>
                            <div class="card-actions">
                                <button class="btn btn-outline-primary btn-sm flex-fill" onclick="downloadImage('${item.processed}', '${item.filename}')">Download</button>
                                <button class="btn btn-primary btn-sm flex-fill" onclick="viewImage('${item.original}', '${item.processed}', '${item.filename}')">View</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewImage(original, processed, filename) {
            document.getElementById('modalOriginal').src = original;
            document.getElementById('modalProcessed').src = processed;
            document.getElementById('modalTitle').textContent = filename;
            document.getElementById('downloadBtn').href = processed;
            document.getElementById('downloadBtn').download = filename;
            
            const modal = new bootstrap.Modal(document.getElementById('imageModal'));
            modal.show();
        }

        function downloadImage(url, filename) {
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);
                })
                .catch(error => console.error('Download error:', error));
        }
    </script>

    <script>
    // Theme Toggle Function
    function toggleTheme() {
        const body = document.body;
        const themeIcon = document.getElementById('themeIcon');
        
        body.classList.toggle('light-mode');
        
        if (body.classList.contains('light-mode')) {
            themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            localStorage.setItem('theme', 'light');
        } else {
            themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            localStorage.setItem('theme', 'dark');
        }
    }

    // Load saved theme on page load
    window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme');
        const themeIcon = document.getElementById('themeIcon');
        
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
        }
    });
    </script>
    <script src="{{ url_for('static', filename='page_transitions.js') }}"></script>
</body>
</html>
