<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery - DRDO Underwater Database</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box h3 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 14px;
            opacity: 0.9;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .image-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .image-preview {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .image-info {
            padding: 15px;
        }

        .image-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .image-meta {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }

        .badge-raw {
            background: #ffc107;
            color: #000;
        }

        .badge-enhanced {
            background: #4caf50;
            color: white;
        }

        .badge-restricted {
            background: #ff5722;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .loading h2 {
            color: #667eea;
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .empty-state h2 {
            color: #333;
            margin: 20px 0;
        }

        .empty-state p {
            color: #666;
            font-size: 16px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .image-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-sm {
            padding: 6px 15px;
            font-size: 13px;
            flex: 1;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 DRDO Underwater Image Database</h1>
            <p>Secure storage and management of processed underwater images</p>
            <div class="stats">
                <div class="stat-box">
                    <h3 id="totalImages">-</h3>
                    <p>Total Images</p>
                </div>
                <div class="stat-box">
                    <h3 id="totalSize">-</h3>
                    <p>Storage Used (GB)</p>
                </div>
                <div class="stat-box">
                    <h3 id="activity24h">-</h3>
                    <p>Activity (24h)</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <div>
                <button class="btn btn-primary" onclick="loadGallery()">🔄 Refresh Gallery</button>
                <button class="btn btn-primary" onclick="window.location.href='/'">🏠 Back to Home</button>
            </div>
            <div>
                <a href="http://localhost:9001" target="_blank" class="btn btn-primary">
                    📦 Open MinIO Console
                </a>
            </div>
        </div>

        <div id="gallery" class="gallery">
            <div class="loading">
                <div class="spinner"></div>
                <h2>Loading images...</h2>
            </div>
        </div>
    </div>

    <script>
        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('totalImages').textContent = stats.total_images || 0;
                document.getElementById('totalSize').textContent = stats.total_size_gb?.toFixed(2) || '0.00';
                document.getElementById('activity24h').textContent = stats.activity_24h || 0;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // Load gallery
        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div class="loading"><div class="spinner"></div><h2>Loading images...</h2></div>';

            try {
                const response = await fetch('/api/gallery');
                const data = await response.json();

                if (data.images && data.images.length > 0) {
                    gallery.innerHTML = '';
                    data.images.forEach(image => {
                        const card = createImageCard(image);
                        gallery.appendChild(card);
                    });
                } else {
                    gallery.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <h2>📷 No Images Yet</h2>
                            <p>Upload and process images to see them here!</p>
                            <button class="btn btn-primary" onclick="window.location.href='/'">
                                Upload Images
                            </button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load gallery:', error);
                gallery.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h2>❌ Error Loading Gallery</h2>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadGallery()">Try Again</button>
                    </div>
                `;
            }
        }

        // Create image card
        function createImageCard(image) {
            const card = document.createElement('div');
            card.className = 'image-card';
            
            const badgeClass = image.type === 'raw' ? 'badge-raw' : 'badge-enhanced';
            const sizeKB = (image.size / 1024).toFixed(1);
            
            card.innerHTML = `
                <img src="/api/image/${image.id}" 
                     alt="${image.filename}" 
                     class="image-preview"
                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22250%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22300%22 height=%22250%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22%3EImage%3C/text%3E%3C/svg%3E'">
                <div class="image-info">
                    <h3 title="${image.filename}">${image.filename}</h3>
                    <div class="image-meta">
                        <span>📅 ${image.uploaded}</span>
                        <span>💾 ${sizeKB} KB</span>
                    </div>
                    <span class="badge ${badgeClass}">${image.type.toUpperCase()}</span>
                    <span class="badge badge-restricted">${image.classification}</span>
                    <div class="image-actions">
                        <button class="btn btn-sm btn-secondary" onclick="downloadImage(${image.id}, '${image.filename}')">
                            📥 Download
                        </button>
                        <button class="btn btn-sm btn-primary" onclick="viewImage(${image.id})">
                            🔍 View
                        </button>
                    </div>
                </div>
            `;
            
            return card;
        }

        // Download image
        function downloadImage(imageId, filename) {
            window.open(`/api/image/${imageId}`, '_blank');
        }

        // View image
        function viewImage(imageId) {
            window.open(`/api/image/${imageId}`, '_blank');
        }

        // Initialize
        loadStats();
        loadGallery();

        // Auto-refresh every 30 seconds
        setInterval(() => {
            loadStats();
        }, 30000);
    </script>
</body>
</html>
